<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — Gemcities</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="/"><svg viewBox="0 0 100 100" width="28" height="28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon points="52,16 74,30 82,55 68,80 36,80 22,55 30,30" fill="none" stroke="#065F46" stroke-width="2.5" opacity="0.9"/><polygon points="50,18 72,32 80,55 66,78 34,78 20,55 28,32" fill="none" stroke="#00C48C" stroke-width="2"/><polygon points="48,20 70,34 78,57 64,80 32,80 18,57 26,34" fill="none" stroke="#00E6A8" stroke-width="2" opacity="0.65"/><text x="50" y="52" fill="#00E6A8" font-family="'Segoe UI Symbol','Noto Sans Symbols',sans-serif" font-size="34" text-anchor="middle" dominant-baseline="middle">&#9802;</text></svg>Gem<span>cities</span></a>
</nav>
<div class="container page-center">
  <div class="card" style="text-align:center">
    <div id="loading">Verifying your email…</div>
    <div id="success" style="display:none">
      <div style="font-size:2.5rem;margin-bottom:1rem">✓</div>
      <h2 style="margin-bottom:0.75rem">Email verified</h2>
      <p style="color:#6c757d;margin-bottom:1.5rem">Your capsule is ready. Sign in to start writing.</p>
      <a href="/login.html" class="btn btn-primary">Sign in</a>
    </div>
    <div id="error" style="display:none">
      <div style="font-size:2.5rem;margin-bottom:1rem">✗</div>
      <h2 style="margin-bottom:0.75rem">Verification failed</h2>
      <p id="error-msg" style="color:#6c757d;margin-bottom:1.5rem"></p>
      <a href="/register.html" class="btn btn-secondary">Back to register</a>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  (async () => {
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').textContent = 'No verification token found.';
      document.getElementById('error').style.display = 'block';
      return;
    }
    try {
      await api.verifyEmail(token);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      const msgs = { INVALID_TOKEN: 'This link is invalid or has already been used.', TOKEN_EXPIRED: 'This link has expired. Please register again.' };
      document.getElementById('error-msg').textContent = msgs[err.error] || 'Verification failed.';
      document.getElementById('error').style.display = 'block';
    }
  })();
</script>
</body>
</html>
