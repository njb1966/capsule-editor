<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — Gemcities</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="/"><svg viewBox="0 0 100 100" width="28" height="28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon points="52,16 74,30 82,55 68,80 36,80 22,55 30,30" fill="none" stroke="#065F46" stroke-width="2.5" opacity="0.9"/><polygon points="50,18 72,32 80,55 66,78 34,78 20,55 28,32" fill="none" stroke="#00C48C" stroke-width="2"/><polygon points="48,20 70,34 78,57 64,80 32,80 18,57 26,34" fill="none" stroke="#00E6A8" stroke-width="2" opacity="0.65"/><text x="50" y="52" fill="#00E6A8" font-family="'Segoe UI Symbol','Noto Sans Symbols',sans-serif" font-size="34" text-anchor="middle" dominant-baseline="middle">&#9802;</text></svg>Gem<span>cities</span></a>
</nav>
<div class="container page-center">
  <div class="card">
    <h2>Set new password</h2>
    <div id="alert" class="alert" style="display:none"></div>
    <form id="form">
      <div class="form-group">
        <label for="password">New password</label>
        <input id="password" type="password" autocomplete="new-password" required minlength="8">
        <div class="form-hint">At least 8 characters.</div>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%">Set password</button>
    </form>
    <div class="form-footer"><a href="/login.html">Back to sign in</a></div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('alert').className = 'alert alert-error';
    document.getElementById('alert').textContent = 'Invalid or missing reset token.';
    document.getElementById('alert').style.display = 'block';
    document.getElementById('form').style.display = 'none';
  }
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alert = document.getElementById('alert');
    const btn   = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      await api.resetPassword(token, document.getElementById('password').value);
      alert.className = 'alert alert-success';
      alert.textContent = 'Password updated. You can now sign in.';
      alert.style.display = 'block';
      document.getElementById('form').style.display = 'none';
    } catch (err) {
      const msgs = { INVALID_TOKEN: 'This link is invalid or already used.', TOKEN_EXPIRED: 'This link has expired.', PASSWORD_TOO_SHORT: 'Password must be at least 8 characters.' };
      alert.className = 'alert alert-error';
      alert.textContent = msgs[err.error] || 'Something went wrong.';
      alert.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Set password';
    }
  });
</script>
</body>
</html>
