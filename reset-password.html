<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — Gemcities</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="/">Gem<span>cities</span></a>
</nav>
<div class="container page-center">
  <div class="card">
    <h2>Set new password</h2>
    <div id="alert" class="alert" style="display:none"></div>
    <form id="form">
      <div class="form-group">
        <label for="password">New password</label>
        <input id="password" type="password" autocomplete="new-password" required minlength="8">
        <div class="form-hint">At least 8 characters.</div>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%">Set password</button>
    </form>
    <div class="form-footer"><a href="/login.html">Back to sign in</a></div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('alert').className = 'alert alert-error';
    document.getElementById('alert').textContent = 'Invalid or missing reset token.';
    document.getElementById('alert').style.display = 'block';
    document.getElementById('form').style.display = 'none';
  }
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alert = document.getElementById('alert');
    const btn   = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      await api.resetPassword(token, document.getElementById('password').value);
      alert.className = 'alert alert-success';
      alert.textContent = 'Password updated. You can now sign in.';
      alert.style.display = 'block';
      document.getElementById('form').style.display = 'none';
    } catch (err) {
      const msgs = { INVALID_TOKEN: 'This link is invalid or already used.', TOKEN_EXPIRED: 'This link has expired.', PASSWORD_TOO_SHORT: 'Password must be at least 8 characters.' };
      alert.className = 'alert alert-error';
      alert.textContent = msgs[err.error] || 'Something went wrong.';
      alert.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Set password';
    }
  });
</script>
</body>
</html>
