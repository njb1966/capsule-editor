<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Gemcities</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="/"><svg viewBox="0 0 100 100" width="28" height="28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon points="52,16 74,30 82,55 68,80 36,80 22,55 30,30" fill="none" stroke="#065F46" stroke-width="2.5" opacity="0.9"/><polygon points="50,18 72,32 80,55 66,78 34,78 20,55 28,32" fill="none" stroke="#00C48C" stroke-width="2"/><polygon points="48,20 70,34 78,57 64,80 32,80 18,57 26,34" fill="none" stroke="#00E6A8" stroke-width="2" opacity="0.65"/><text x="50" y="52" fill="#00E6A8" font-family="'Segoe UI Symbol','Noto Sans Symbols',sans-serif" font-size="34" text-anchor="middle" dominant-baseline="middle">&#9802;</text></svg>Gem<span>cities</span></a>
  <div class="nav-links"><a href="/login.html">Sign in</a></div>
</nav>
<div class="container page-center">
  <div class="card">
    <h2>Reset your password</h2>
    <div id="alert" class="alert" style="display:none"></div>
    <form id="form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input id="email" type="email" autocomplete="email" required>
        <div class="form-hint">We'll send a reset link if an account exists with this email.</div>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%">Send reset link</button>
    </form>
    <div class="form-footer"><a href="/login.html">Back to sign in</a></div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alert = document.getElementById('alert');
    const btn   = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    await api.requestReset(document.getElementById('email').value.trim()).catch(() => {});
    alert.className = 'alert alert-success';
    alert.textContent = 'If an account exists with that email, a reset link has been sent.';
    alert.style.display = 'block';
    document.getElementById('form').style.display = 'none';
  });
</script>
</body>
</html>
