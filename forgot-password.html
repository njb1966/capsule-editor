<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Gemcities</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="/">Gem<span>cities</span></a>
  <div class="nav-links"><a href="/login.html">Sign in</a></div>
</nav>
<div class="container page-center">
  <div class="card">
    <h2>Reset your password</h2>
    <div id="alert" class="alert" style="display:none"></div>
    <form id="form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input id="email" type="email" autocomplete="email" required>
        <div class="form-hint">We'll send a reset link if an account exists with this email.</div>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%">Send reset link</button>
    </form>
    <div class="form-footer"><a href="/login.html">Back to sign in</a></div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alert = document.getElementById('alert');
    const btn   = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    await api.requestReset(document.getElementById('email').value.trim()).catch(() => {});
    alert.className = 'alert alert-success';
    alert.textContent = 'If an account exists with that email, a reset link has been sent.';
    alert.style.display = 'block';
    document.getElementById('form').style.display = 'none';
  });
</script>
</body>
</html>
