<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Settings — Gemcities</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="/"><svg viewBox="0 0 100 100" width="28" height="28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon points="52,16 74,30 82,55 68,80 36,80 22,55 30,30" fill="none" stroke="#065F46" stroke-width="2.5" opacity="0.9"/><polygon points="50,18 72,32 80,55 66,78 34,78 20,55 28,32" fill="none" stroke="#00C48C" stroke-width="2"/><polygon points="48,20 70,34 78,57 64,80 32,80 18,57 26,34" fill="none" stroke="#00E6A8" stroke-width="2" opacity="0.65"/><text x="50" y="52" fill="#00E6A8" font-family="'Segoe UI Symbol','Noto Sans Symbols',sans-serif" font-size="34" text-anchor="middle" dominant-baseline="middle">&#9802;</text></svg>Gem<span>cities</span></a>
  <div class="nav-links">
    <a href="/editor.html">Back to editor</a>
  </div>
</nav>
<div class="container" style="padding-top:2rem">
  <h1 style="font-size:1.4rem;margin-bottom:2rem">Account settings</h1>

  <div class="card" style="margin-bottom:1.5rem">
    <h2 style="font-size:1.1rem;margin-bottom:1rem">Storage</h2>
    <div id="storage-text" style="font-size:0.9rem;color:#6c757d;margin-bottom:0.5rem">Loading…</div>
    <div style="height:6px;background:#e9ecef;border-radius:3px">
      <div id="storage-bar" style="height:6px;width:0%;background:#0d9488;border-radius:3px;transition:width 0.3s"></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:1.5rem">
    <h2 style="font-size:1.1rem;margin-bottom:1rem">Export capsule</h2>
    <p style="font-size:0.9rem;color:#6c757d;margin-bottom:1rem">Download all your files as a ZIP archive.</p>
    <button class="btn btn-secondary" onclick="api.export()">Download ZIP</button>
  </div>

  <div class="card" style="margin-bottom:1.5rem;border-color:#fecaca">
    <h2 style="font-size:1.1rem;margin-bottom:0.5rem;color:#dc3545">Delete account</h2>
    <p style="font-size:0.9rem;color:#6c757d;margin-bottom:1rem">Permanently deletes your account and all files. This cannot be undone.</p>
    <div id="delete-alert" class="alert alert-error" style="display:none"></div>
    <button class="btn btn-danger btn-sm" onclick="showDeleteForm()">Delete my account</button>
    <form id="delete-form" style="display:none;margin-top:1rem">
      <div class="form-group">
        <label for="del-password">Confirm your password</label>
        <input id="del-password" type="password" autocomplete="current-password" required>
      </div>
      <div style="display:flex;gap:0.75rem">
        <button type="submit" class="btn btn-danger btn-sm" id="delete-btn">Delete permanently</button>
        <button type="button" class="btn btn-secondary btn-sm" onclick="hideDeleteForm()">Cancel</button>
      </div>
    </form>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  function fmtBytes(n) {
    if (n < 1024) return n + ' B';
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
    return (n / (1024 * 1024)).toFixed(1) + ' MB';
  }

  (async () => {
    try {
      const { storage_bytes, storage_limit_bytes } = await api.getAccount();
      const pct = Math.min(100, (storage_bytes / storage_limit_bytes) * 100);
      const color = pct >= 90 ? '#dc3545' : pct >= 70 ? '#fd7e14' : '#0d9488';
      document.getElementById('storage-text').textContent =
        fmtBytes(storage_bytes) + ' of ' + fmtBytes(storage_limit_bytes) + ' used';
      const bar = document.getElementById('storage-bar');
      bar.style.width = pct.toFixed(1) + '%';
      bar.style.background = color;
    } catch (_) {
      document.getElementById('storage-text').textContent = 'Could not load storage info.';
    }
  })();

  function showDeleteForm() { document.getElementById('delete-form').style.display = 'block'; }
  function hideDeleteForm() { document.getElementById('delete-form').style.display = 'none'; }

  document.getElementById('delete-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alert = document.getElementById('delete-alert');
    const btn   = document.getElementById('delete-btn');
    btn.disabled = true;
    btn.textContent = 'Deleting…';
    try {
      await api.deleteAccount(document.getElementById('del-password').value);
      window.location.href = '/?deleted=1';
    } catch (err) {
      alert.textContent = err.error === 'INVALID_CREDENTIALS' ? 'Incorrect password.' : 'Something went wrong.';
      alert.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Delete permanently';
    }
  });
</script>
</body>
</html>
