<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Gemcities</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="/"><svg viewBox="0 0 100 100" width="28" height="28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon points="52,16 74,30 82,55 68,80 36,80 22,55 30,30" fill="none" stroke="#065F46" stroke-width="2.5" opacity="0.9"/><polygon points="50,18 72,32 80,55 66,78 34,78 20,55 28,32" fill="none" stroke="#00C48C" stroke-width="2"/><polygon points="48,20 70,34 78,57 64,80 32,80 18,57 26,34" fill="none" stroke="#00E6A8" stroke-width="2" opacity="0.65"/><text x="50" y="52" fill="#00E6A8" font-family="'Segoe UI Symbol','Noto Sans Symbols',sans-serif" font-size="34" text-anchor="middle" dominant-baseline="middle">&#9802;</text></svg>Gem<span>cities</span></a>
  <div class="nav-links"><a href="/register.html">Register</a></div>
</nav>
<div class="container page-center">
  <div class="card">
    <h2>Sign in</h2>
    <div id="alert" class="alert" style="display:none"></div>
    <form id="form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input id="email" type="email" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%">Sign in</button>
    </form>
    <div class="form-footer">
      <a href="/forgot-password.html">Forgot password?</a>
      &nbsp;·&nbsp;
      No account? <a href="/register.html">Register</a>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alert = document.getElementById('alert');
    const btn   = document.getElementById('submit-btn');
    alert.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      await api.login(
        document.getElementById('email').value.trim(),
        document.getElementById('password').value
      );
      window.location.href = '/editor.html';
    } catch (err) {
      const msgs = {
        INVALID_CREDENTIALS: 'Incorrect email or password.',
        EMAIL_NOT_VERIFIED:  'Please verify your email address before signing in.',
        RATE_LIMITED:        'Too many attempts. Please wait a minute and try again.',
      };
      alert.className = 'alert alert-error';
      alert.textContent = msgs[err.error] || 'Something went wrong. Please try again.';
      alert.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
